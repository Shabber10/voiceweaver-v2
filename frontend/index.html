<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakWeaver | Premium Text-to-Speech</title>
    <link rel="stylesheet" href="index.css">
    <!-- Tesseract.js for OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <header class="top-bar">
            <div class="logo">
                <h1>SpeakWeaver</h1>
                MADE BY SHABBER HUSSAIN
            </div>
            <div class="actions">
                <select id="voice-select" class="voice-select" title="Select Voice">
                    <optgroup label="Female Voices">
                        <option value="en-US-AriaNeural" selected>Riya (Default)</option>
                        <option value="en-US-JennyNeural">Jenny</option>
                        <option value="en-US-MichelleNeural">Michelle</option>
                        <option value="en-GB-SoniaNeural">Sonia (British)</option>
                        <option value="en-AU-NatashaNeural">Natasha (Australian)</option>
                    </optgroup>
                    <optgroup label="Male Voices">
                        <option value="en-US-GuyNeural">Guy</option>
                        <option value="en-US-ChristopherNeural">Christopher</option>
                        <option value="en-US-EricNeural">Eric</option>
                        <option value="en-GB-RyanNeural">Ryan (British)</option>
                        <option value="en-AU-WilliamNeural">William (Australian)</option>
                    </optgroup>
                </select>
                <button id="upload-image-btn" class="secondary-btn" title="Upload Image for OCR">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    <span>Upload Image</span>
                </button>
                <input type="file" id="image-input" accept="image/*" style="display: none;">
                <button id="download-btn" class="download-btn-premium" title="Download Audio">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    <span>Download MP3</span>
                </button>
            </div>
        </header>

        <main class="content-area"
            style="flex: 1; display: flex; flex-direction: column; padding-bottom: 20px; min-height: 0;">
            <div class="status-message" id="status-message"></div>
            <div class="tts-card" style="min-height: 0;">
                <div id="text-mode" class="input-group flex-grow" style="min-height: 0;">
                    <div class="text-container" style="position: relative; flex-grow: 1; display: flex; height: 100%;">
                        <textarea id="text-input" placeholder="Start speaking your thoughts... Enter text here."
                            maxlength="25000"
                            style="resize: none; flex-grow: 1; height: 100%; min-height: 0;"></textarea>
                        <div id="text-overlay" class="hidden"
                            style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; padding: 1rem; font-size: 1.1rem; font-family: inherit; white-space: pre-wrap; word-wrap: break-word; overflow: hidden; color: transparent; background: transparent; z-index: 2; border: 1px solid transparent;">
                        </div>
                    </div>
                    <div class="char-count"><span id="count">0</span> / 25000</div>
                </div>

                <div id="image-mode" class="image-display-container hidden">
                    <button id="close-image-btn" class="close-btn" title="Remove image">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                    <div class="image-wrapper" id="zoom-target">
                        <img id="uploaded-image" alt="Uploaded OCR Source">
                        <canvas id="highlight-canvas"></canvas>
                        <div id="ocr-loader" class="ocr-loader hidden">
                            <div class="spinner"></div>
                            <p>Extracting text...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="bottom-dashboard">
            <!-- Aura background shapes (same technique as body bg) -->
            <div class="dock-shape dock-shape-1"></div>
            <div class="dock-shape dock-shape-2"></div>
            <div class="dock-shape dock-shape-3"></div>
            <!-- Frosted scrim keeps controls readable -->
            <div class="dock-glass-scrim"></div>
            <div class="progress-container">
                <div class="time-label" id="current-time">0:00</div>
                <input type="range" id="progress-slider" class="audio-progress" min="0" max="100" value="0">
                <div class="time-label" id="total-time">0:00</div>
            </div>

            <div class="bottom-bar-controls">
                <div class="center-controls"
                    style="flex: 1; display: flex; justify-content: center; align-items: center; gap: 0.75rem;">
                    <button id="skip-back-30-btn" class="control-btn empty-btn" title="Rewind 30s">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                            <path d="M3 3v5h5"></path><text x="12" y="15.5" font-size="8" font-family="sans-serif"
                                font-weight="bold" fill="currentColor" stroke="none" text-anchor="middle">30</text>
                        </svg>
                    </button>
                    <button id="skip-back-btn" class="control-btn empty-btn" title="Rewind 10s">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                            <path d="M3 3v5h5"></path><text x="12" y="15.5" font-size="8" font-family="sans-serif"
                                font-weight="bold" fill="currentColor" stroke="none" text-anchor="middle">10</text>
                        </svg>
                    </button>

                    <button id="pause-play-btn" class="control-btn empty-btn play-circle-btn" title="Pause/Play">
                        <svg id="pause-icon" style="display: none;" width="24" height="24" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <rect x="6" y="4" width="4" height="16" />
                            <rect x="14" y="4" width="4" height="16" />
                        </svg>
                        <svg id="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                    </button>

                    <button id="skip-forward-10-btn" class="control-btn empty-btn" title="Forward 10s">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
                            <path d="M21 3v5h-5"></path><text x="12" y="15.5" font-size="8" font-family="sans-serif"
                                font-weight="bold" fill="currentColor" stroke="none" text-anchor="middle">10</text>
                        </svg>
                    </button>
                    <button id="skip-forward-btn" class="control-btn empty-btn" title="Forward 30s">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
                            <path d="M21 3v5h-5"></path><text x="12" y="15.5" font-size="8" font-family="sans-serif"
                                font-weight="bold" fill="currentColor" stroke="none" text-anchor="middle">30</text>
                        </svg>
                    </button>
                    <button id="loop-btn" class="control-btn empty-btn loop-btn" title="Toggle Loop">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="17 1 21 5 17 9"></polyline>
                            <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                            <polyline points="7 23 3 19 7 15"></polyline>
                            <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                        </svg>
                    </button>
                    <div class="settings-container">
                        <button id="settings-btn" class="control-btn empty-btn" title="More Options">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="1" />
                                <circle cx="12" cy="5" r="1" />
                                <circle cx="12" cy="19" r="1" />
                            </svg>
                        </button>
                        <div id="settings-popover" class="settings-popover hidden" style="width: 260px;">
                            <div class="popover-item"
                                style="flex-direction: column; align-items: flex-start; gap: 0.5rem; justify-content: center;">
                                <div style="font-weight: 600; font-size: 0.8rem; color: var(--text-color);">Volume</div>
                                <div
                                    style="display: flex; align-items: center; gap: 0.5rem; width: 100%; justify-content: space-between;">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                        style="min-width: 18px;">
                                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                                    </svg>
                                    <button id="vol-down" class="control-btn empty-btn"
                                        style="width:20px; height:20px; padding:0; display:flex; justify-content:center; align-items:center;">-</button>
                                    <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1"
                                        class="audio-progress" style="width: 100%;">
                                    <button id="vol-up" class="control-btn empty-btn"
                                        style="width:20px; height:20px; padding:0; display:flex; justify-content:center; align-items:center;">+</button>
                                </div>
                            </div>

                            <div class="popover-item"
                                style="flex-direction: column; align-items: flex-start; gap: 0.5rem; justify-content: center; margin-top: 0.25rem;">
                                <div style="font-weight: 600; font-size: 0.8rem; color: var(--text-color);">Playback
                                    Speed</div>
                                <div
                                    style="display: flex; align-items: center; gap: 0.5rem; width: 100%; justify-content: space-between;">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                        style="min-width: 18px;">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <polyline points="12 6 12 12 16 14"></polyline>
                                    </svg>
                                    <button id="speed-down" class="control-btn empty-btn"
                                        style="width:20px; height:20px; padding:0; display:flex; justify-content:center; align-items:center;">-</button>
                                    <input type="range" id="speed-slider" min="0.25" max="2" step="0.25" value="1"
                                        class="audio-progress" style="width: 100%;">
                                    <button id="speed-up" class="control-btn empty-btn"
                                        style="width:20px; height:20px; padding:0; display:flex; justify-content:center; align-items:center;">+</button>
                                    <span id="speed-label"
                                        style="font-size: 0.75rem; min-width: 2.2rem; text-align: right;">1.0x</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <audio id="audio-player" style="display: none;"></audio>
    <!-- Central Generation Loader -->
    <div id="voice-loader" class="voice-loader hidden">
        <div class="loader-content">
            <div class="loader-ring">
                <svg width="120" height="120">
                    <circle class="ring-bg" cx="60" cy="60" r="54"></circle>
                    <circle id="ring-progress" cx="60" cy="60" r="54"></circle>
                </svg>
                <div id="load-percent" class="percent-text">0%</div>
            </div>
            <p>Optimizing your voice...</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Custom Dropdown UI to replace the native OS select
        document.addEventListener('DOMContentLoaded', () => {
            const nativeSelect = document.getElementById('voice-select');
            nativeSelect.style.display = 'none';

            // Create wrapper
            const wrapper = document.createElement('div');
            wrapper.className = 'custom-dropdown';
            nativeSelect.parentNode.insertBefore(wrapper, nativeSelect);
            wrapper.appendChild(nativeSelect);

            // Create selected display
            const selectedDiv = document.createElement('div');
            selectedDiv.className = 'custom-dropdown-selected';
            selectedDiv.innerHTML = `<span>${nativeSelect.options[nativeSelect.selectedIndex].text}</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>`;
            wrapper.appendChild(selectedDiv);

            // Create options container
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'custom-dropdown-options';
            wrapper.appendChild(optionsDiv);

            // Populate options from native select
            Array.from(nativeSelect.children).forEach(child => {
                if (child.tagName === 'OPTGROUP') {
                    const groupTitle = document.createElement('div');
                    groupTitle.className = 'custom-optgroup';
                    groupTitle.textContent = child.label;
                    optionsDiv.appendChild(groupTitle);

                    Array.from(child.children).forEach(option => {
                        const optDiv = document.createElement('div');
                        optDiv.className = 'custom-option';
                        if (option.selected) optDiv.classList.add('selected');
                        optDiv.textContent = option.text;
                        optDiv.dataset.value = option.value;

                        optDiv.addEventListener('click', () => {
                            // Update native select
                            nativeSelect.value = optDiv.dataset.value;
                            nativeSelect.dispatchEvent(new Event('change'));

                            // Update UI
                            selectedDiv.querySelector('span').textContent = optDiv.textContent;
                            wrapper.querySelectorAll('.custom-option').forEach(el => el.classList.remove('selected'));
                            optDiv.classList.add('selected');
                            wrapper.classList.remove('open');
                        });
                        optionsDiv.appendChild(optDiv);
                    });
                }
            });

            // Toggle dropdown
            selectedDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                wrapper.classList.toggle('open');
            });

            // Close on outside click
            document.addEventListener('click', () => {
                wrapper.classList.remove('open');
            });
        });
    </script>
</body>

</html>
